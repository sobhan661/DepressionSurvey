databases:
  - name: depression-survey-db
    plan: free

services:
  - type: web
    name: depression-survey
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn --chdir webapp webapp.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: depression-survey-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
